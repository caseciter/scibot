<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Orders</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Georgia, serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        main {
            max-width: 650px;
            width: 100%;
        }
        p {
            margin-bottom: 1.5em;
            font-size: 1.1rem;
            text-align: justify;
        }
        h1, h2, h3 {
            font-weight: bold;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <main id="content">Loading latest updates...</main>
    <script>
        // Fetches the markdown file generated by the python script
        fetch('latest.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(markdownText => {
                document.getElementById('content').innerHTML = marked.parse(markdownText);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p>Error loading document data.</p>';
                console.error(err);
            });
    </script>
</body>
</html>
