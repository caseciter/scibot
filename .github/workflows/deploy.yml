name: Scheduled PDF Website Update

on:
  schedule:
    - cron: '0 1 * * *' # Triggers automatically every single day at 01:00 UTC (6:30 AM IST)
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger this pipeline manually from the GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf==4.2.0

      - name: Execute PDF Downloader & Extractor
        run: python extract.py

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
